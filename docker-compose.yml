services:
  broncos-tickets:
    build: .
    container_name: broncos-tickets
    restart: unless-stopped
    ports:
      - "3001:3001"
    volumes:
      - /mnt/user/appdata/broncos-tickets/data:/app/data
    environment:
      DB_URL: file:/app/data/broncos.db
      ADMIN_TOKEN: ${ADMIN_TOKEN:?set a strong admin token}
      ADMIN_EMAIL: msmigiel22@gmail.com
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_SECURE: ${SMTP_SECURE:-false}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASS: ${SMTP_PASS:-}
      EMAIL_FROM: "Smigiel Broncos Tickets <no-reply@example.com>"
